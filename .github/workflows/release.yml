name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version part to bump (ignored if 'version' is set)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      version:
        description: "Exact version to release, e.g. 0.2.0 (optional; overrides 'bump')"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Tag & release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, needed to find the latest release

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Safety gate: never tag/publish a release that doesn't build, vet, or
      # pass tests, regardless of what CI already reported on this commit.
      - name: Verify gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -race

      - name: Compute next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
          VERSION_OVERRIDE: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "$VERSION_OVERRIDE" ]; then
            next="${VERSION_OVERRIDE#v}"
          else
            latest="$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)"
            latest="${latest:-v0.0.0}"
            echo "Latest tag: $latest"

            version="${latest#v}"
            IFS='.' read -r major minor patch <<< "$version"

            case "$BUMP" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
              *) echo "unknown bump type: $BUMP" >&2; exit 1 ;;
            esac

            next="${major}.${minor}.${patch}"
          fi

          tag="v${next}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists" >&2
            exit 1
          fi

          echo "Releasing $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: echo "### Released $TAG" >> "$GITHUB_STEP_SUMMARY"
