version: 2

project_name: go-agent

# go-agent is a library — `go get github.com/prasenjit-net/go-agent@<tag>`
# is how consumers actually "install" a release, so there's nothing for
# GoReleaser to build. This config only tags the GitHub Release and
# generates its changelog.
builds:
  - skip: true

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: prasenjit-net
    name: go-agent
  name_template: "v{{ .Version }}"
  header: |
    ## Install

    ```sh
    go get github.com/prasenjit-net/go-agent@{{ .Tag }}
    ```

    First-class provider adapters (import only the ones you use):

    ```sh
    go get github.com/prasenjit-net/go-agent/provider/claude@{{ .Tag }}
    go get github.com/prasenjit-net/go-agent/provider/openai@{{ .Tag }}
    go get github.com/prasenjit-net/go-agent/provider/gemini@{{ .Tag }}
    ```

    Runnable examples live in
    [`examples/`](https://github.com/prasenjit-net/go-agent/tree/{{ .Tag }}/examples) —
    clone the repo and `go run` them directly; each needs a provider API key
    set as an environment variable (see the README).
